# Production-style split: API + Next.js. Adjust NEXT_PUBLIC_API_URL to the URL browsers use to reach the API.
services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      ERP_SCRAPER_MODE: "${ERP_SCRAPER_MODE:-demo}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:5000}"
    ports:
      - "3000:3000"
    depends_on:
      - api
